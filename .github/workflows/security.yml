name: CI Security Pipeline

on:
  push:
    branches: ["main", "master"]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT CODE
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v3

      # -------------------------
      # SECRET SCANNING (GITLEAKS)
      # -------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # allow pipeline to proceed for testing

      # -------------------------
      # BUILD DOCKER IMAGE
      # -------------------------
      - name: Build Docker Image
        run: docker build -t myapp .

      # -------------------------
      # CONTAINER SCAN (TRIVY)
      # -------------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp
          severity: HIGH,CRITICAL
          exit-code: 0 # bypass for now to test Sonar kill switch

      # -------------------------
      # SONARCLOUD SCAN
      # -------------------------
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=Earnest07_ci-cd-security-pipeline
            -Dsonar.organization=earnest07
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.branch.name=${{ github.ref_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # DEBUG (VERY IMPORTANT)
      # -------------------------
      - name: Debug scanner output
        run: |
          echo "Checking scannerwork..."
          ls -la .scannerwork || echo "No scannerwork found"
          cat .scannerwork/report-task.txt || echo "No report-task.txt"

      # -------------------------
      # WAIT FOR SONAR PROCESSING (CRITICAL FIX)
      # -------------------------
      - name: Wait for SonarCloud processing
        run: sleep 30

      # -------------------------
      # ROBUST QUALITY GATE CHECK (KILL SWITCH)
      # -------------------------
      - name: Enforce Sonar Quality Gate
        run: |
          echo "Extracting CE Task ID..."
          CE_TASK_ID=$(grep ceTaskId .scannerwork/report-task.txt | cut -d= -f2)

          echo "CE Task ID: $CE_TASK_ID"

          STATUS="PENDING"

          echo "Waiting for SonarCloud analysis to complete..."

          while [[ "$STATUS" == "PENDING" || "$STATUS" == "IN_PROGRESS" ]]; do
            RESPONSE=$(curl -s -u $SONAR_TOKEN: \
              "https://sonarcloud.io/api/ce/task?id=$CE_TASK_ID")

            STATUS=$(echo $RESPONSE | jq -r '.task.status')
            echo "Current Status: $STATUS"

            sleep 5
          done

          ANALYSIS_ID=$(echo $RESPONSE | jq -r '.task.analysisId')

          echo "Analysis ID: $ANALYSIS_ID"

          QG_STATUS=$(curl -s -u $SONAR_TOKEN: \
            "https://sonarcloud.io/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            echo "❌ Quality Gate FAILED - Breaking Pipeline"
            exit 1
          else
            echo "✅ Quality Gate PASSED"
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
