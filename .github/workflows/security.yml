name: CI Security Pipeline

on:
  push:
    branches: ["main", "master"]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT CODE
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v3

      # -------------------------
      # SETUP PYTHON (for tests)
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # -------------------------
      # RUN TESTS + COVERAGE
      # -------------------------
      - name: Run Tests with Coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=app --cov-report=xml:coverage.xml

      # -------------------------
      # SECRET SCANNING (GITLEAKS)
      # -------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # -------------------------
      # BUILD DOCKER IMAGE
      # -------------------------
      - name: Build Docker Image
        run: docker build -t myapp .

      # -------------------------
      # CONTAINER SCAN (TRIVY)
      # -------------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp
          severity: HIGH,CRITICAL
          exit-code: 1

      # -------------------------
      # SONARCLOUD SCAN
      # -------------------------
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=Earnest07_ci-cd-security-pipeline
            -Dsonar.organization=earnest07
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------------------------
      # DEBUG
      # -------------------------
      - name: Debug scanner output
        run: |
          ls -la .scannerwork || echo "No scannerwork found"
          cat .scannerwork/report-task.txt || echo "No report-task.txt"

      # -------------------------
      # QUALITY GATE CHECK
      # -------------------------
      - name: Enforce Sonar Quality Gate
        run: |
          CE_TASK_ID=$(grep ceTaskId .scannerwork/report-task.txt | cut -d= -f2)
          echo "CE Task ID: $CE_TASK_ID"

          STATUS="PENDING"

          while [[ "$STATUS" == "PENDING" || "$STATUS" == "IN_PROGRESS" ]]; do
            RESPONSE=$(curl -s -u $SONAR_TOKEN: \
              "https://sonarcloud.io/api/ce/task?id=$CE_TASK_ID")

            STATUS=$(echo $RESPONSE | jq -r '.task.status')
            echo "Status: $STATUS"
            sleep 5
          done

          ANALYSIS_ID=$(echo $RESPONSE | jq -r '.task.analysisId')

          QG_STATUS=$(curl -s -u $SONAR_TOKEN: \
            "https://sonarcloud.io/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
